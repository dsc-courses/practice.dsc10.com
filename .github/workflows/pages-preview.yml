name: Preview Deploy

on:
  pull_request:
    branches: [ master, main ]
    paths:
      - 'run.py'
      - 'run-utf8.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'problems/**'
      - 'pages/**'
      - 'utils/**'
      - 'templates/**'
      - '.github/workflows/pages-preview.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      # Pandoc is required by your generator
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python deps
        run: uv sync --frozen

      - name: Build site
        run: uv run python run.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy preview
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: preview           # Make sure Settings → Environments → preview allows all branches
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
